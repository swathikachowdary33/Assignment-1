<!DOCTYPE html>
<html>
<head>
    
    <title>Checkout</title>
    <link rel="stylesheet" href="style_test1.css">

    <script>
        function validateForm() {
            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let phone = document.getElementById("phone").value;
            let address = document.getElementById("address").value;
            let city = document.getElementById("city").value;
            let pin = document.getElementById("pin").value;
            let terms = document.getElementById("terms").checked;

            let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

            // Name validation
            if (name === "") {
                alert("Full Name is required");
                return false;
            }

            // Email validation
            if (!email.match(emailPattern)) {
                alert("Enter a valid email");
                return false;
            }

            // Phone validation (10 digits)
            if (!phone.match(/^[0-9]{10}$/)) {
                alert("Phone number must be 10 digits");
                return false;
            }

            // Address validation
            if (address === "") {
                alert("Address is required");
                return false;
            }

            // City validation
            if (city === "") {
                alert("City is required");
                return false;
            }

            // PIN validation (6 digits)
            if (!pin.match(/^[0-9]{6}$/)) {
                alert("PIN Code must be 6 digits");
                return false;
            }

            // Terms checkbox
            if (!terms) {
                alert("You must accept Terms & Conditions");
                return false;
            }

            alert("Order placed successfully!");
            return true;
        }
    </script>
</head>

<body>

    <!-- Navigation -->
    <div>
        <a href="index_test1.html">Home</a> |
        <a href="products_test1.html">Products</a> |
        <a href="contact_test1.html">Contact</a> |
         <a href="checkout_test1.html">Checkout</a>
    </div>

    <h2>Checkout Form</h2>

    <form onsubmit="return validateForm()">

        <label>Full Name:</label><br>
        <input type="text" id="name"><br><br>

        <label>Email:</label><br>
        <input type="text" id="email"><br><br>

        <label>Phone Number:</label><br>
        <input type="text" id="phone"><br><br>

        <label>Address:</label><br>
        <textarea id="address"></textarea><br><br>

        <label>City:</label><br>
        <input type="text" id="city"><br><br>

        <label>PIN Code:</label><br>
        <input type="text" id="pin"><br><br>

        <!-- Payment Method -->
        <label>Payment Method:</label><br>
        <input type="radio" name="payment"> Cash on Delivery<br>
        <input type="radio" name="payment"> Credit Card<br>
        <input type="radio" name="payment"> UPI<br><br>

        <!-- Terms -->
        <input type="checkbox" id="terms"> I accept Terms & Conditions<br><br>

        <button type="submit">Place Order</button>

    </form>

</body>
</html>
